<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Space Shooter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            color: white;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: linear-gradient(to bottom, #020111 0%, #20124d 100%);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
        }

        .game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            margin-top: 20px;
        }

        .hud {
            position: absolute;
            padding: 15px;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.8);
            z-index: 10;
        }

        #score-display {
            top: 10px;
            left: 10px;
            font-size: 24px;
            color: #0df;
        }

        #weapon-level {
            bottom: 10px;
            left: 10px;
            font-size: 18px;
            color: #ff0;
        }

        #bomb-count {
            bottom: 10px;
            right: 10px;
            font-size: 18px;
            color: #f0f;
        }

        #shield-status {
            top: 10px;
            right: 10px;
            font-size: 18px;
            color: #0f0;
            display: none;
        }

        #boss-hp-container {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 20px;
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #f00;
            display: none;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px #f00;
        }

        #boss-hp-bar {
            width: 100%;
            height: 100%;
            background: #f00;
            transition: width 0.1s;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #0df;
            text-shadow: 0 0 15px #0df, 0 0 30px #0df;
            text-align: center;
        }

        p {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            font-family: inherit;
            cursor: pointer;
            background: transparent;
            color: #0df;
            border: 2px solid #0df;
            border-radius: 30px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3) inset, 0 0 10px rgba(0, 255, 255, 0.3);
        }

        button:hover {
            background: #0df;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8) inset, 0 0 20px rgba(0, 255, 255, 0.8);
            transform: scale(1.05);
        }

        .item-legend {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        .circle {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Screen shake animation via JS variable applied to canvas */
    </style>
</head>

<body>

    <div id="ui-container">
        <div class="game-wrapper">
            <div id="score-display" class="hud">SCORE: 0</div>
            <div id="shield-status" class="hud">SHIELD ACTIVE</div>
            <div id="boss-hp-container" class="hud">
                <div id="boss-hp-bar"></div>
            </div>
            <div id="weapon-level" class="hud">WEAPON LV: 1</div>
            <div id="bomb-count" class="hud">BOMBS (B): 1</div>

            <div id="start-screen" class="screen">
                <h1>NEON<br>STRIKER</h1>
                <p>Controls: Arrow Keys to Move<br>Spacebar to Shoot (Auto-fire)<br>B to use Nuke (Bomb)</p>
                <div class="item-legend">
                    <div class="legend-item"><span class="circle" style="background:#ffea00;"></span> Power-up</div>
                    <div class="legend-item"><span class="circle" style="background:#00ff00;"></span> Shield</div>
                    <div class="legend-item"><span class="circle" style="background:#ff00ff;"></span> Nuke</div>
                </div>
                <br>
                <button onclick="startGame()">Engage</button>
            </div>

            <div id="game-over-screen" class="screen" style="display: none;">
                <h1 style="color: #f00; text-shadow: 0 0 15px #f00;">MISSION FAILED</h1>
                <p>FINAL SCORE: <span id="final-score" style="color:#fff; font-size:24px; font-weight:bold;">0</span>
                </p>
                <button onclick="startGame()" style="border-color:#f00; color:#f00;">Retry</button>
            </div>

            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const uiScore = document.getElementById('score-display');
        const uiWeapon = document.getElementById('weapon-level');
        const uiBomb = document.getElementById('bomb-count');
        const uiShield = document.getElementById('shield-status');
        const bossHpContainer = document.getElementById('boss-hp-container');
        const bossHpBar = document.getElementById('boss-hp-bar');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');

        // Game State
        let state = 'menu'; // menu, playing, gameover
        let score = 0;
        let frames = 0;
        let screenShake = 0;

        // Arrays representing game objects
        let stars = [];
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let items = [];

        // Boss state
        let boss = null;
        let bossActive = false;
        let scoreToNextBoss = 5000;

        // Keys
        const keys = {
            ArrowUp: false, ArrowDown: false,
            ArrowLeft: false, ArrowRight: false,
            Space: false, b: false
        };

        window.addEventListener('keydown', e => {
            if (keys.hasOwnProperty(e.code) || e.key === 'b') {
                if (e.code === 'Space' || e.key === 'b' || e.code.startsWith('Arrow')) e.preventDefault();

                if (e.code === 'Space') keys.Space = true;
                else if (e.key.toLowerCase() === 'b' && !keys.b) {
                    keys.b = true;
                    useBomb();
                }
                else keys[e.code] = true;
            }
        });

        window.addEventListener('keyup', e => {
            if (e.code === 'Space') keys.Space = false;
            else if (e.key.toLowerCase() === 'b') keys.b = false;
            else if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        // Object Pooling / Classes
        class Player {
            constructor() {
                this.width = 40;
                this.height = 40;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - 80;
                this.speed = 7;
                this.color = '#0df';
                this.weaponLevel = 1;
                this.maxWeaponLevel = 5;
                this.bombs = 1;
                this.shieldTime = 0;
                this.lastShot = 0;
                this.fireRate = 12; // lower is faster
                this.isFlashing = false;
                this.flashTime = 0;
            }

            update() {
                if (keys.ArrowLeft && this.x > 0) this.x -= this.speed;
                if (keys.ArrowRight && this.x < canvas.width - this.width) this.x += this.speed;
                if (keys.ArrowUp && this.y > 0) this.y -= this.speed;
                if (keys.ArrowDown && this.y < canvas.height - this.height) this.y += this.speed;

                if (keys.Space && frames - this.lastShot > this.fireRate) {
                    this.shoot();
                    this.lastShot = frames;
                }

                if (this.shieldTime > 0) {
                    this.shieldTime--;
                    uiShield.style.display = 'block';
                    if (this.shieldTime < 60 && frames % 10 < 5) uiShield.style.opacity = 0.5;
                    else uiShield.style.opacity = 1;
                } else {
                    uiShield.style.display = 'none';
                }

                if (this.flashTime > 0) this.flashTime--;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);

                // Engine thrust
                ctx.fillStyle = `rgba(0, 255, 255, ${Math.random()})`;
                ctx.beginPath();
                ctx.moveTo(-10, 20);
                ctx.lineTo(10, 20);
                ctx.lineTo(0, 30 + Math.random() * 15);
                ctx.fill();

                // Ship Body
                if (this.flashTime > 0 && frames % 6 < 3) ctx.fillStyle = '#fff';
                else ctx.fillStyle = this.color;

                ctx.beginPath();
                ctx.moveTo(0, -this.height / 2);
                ctx.lineTo(-this.width / 2, this.height / 2);
                ctx.lineTo(0, this.height / 2 - 10);
                ctx.lineTo(this.width / 2, this.height / 2);
                ctx.closePath();
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();

                // Cockpit
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(0, -this.height / 4);
                ctx.lineTo(-5, 0);
                ctx.lineTo(5, 0);
                ctx.fill();

                // Shield
                if (this.shieldTime > 0) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(0, 255, 0, ${0.5 + Math.sin(frames * 0.1) * 0.2})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fillStyle = `rgba(0, 255, 0, 0.1)`;
                    ctx.fill();
                }

                ctx.restore();
            }

            shoot() {
                const cx = this.x + this.width / 2;
                const cy = this.y;

                // Multi-shot logic based on level
                if (this.weaponLevel === 1) {
                    bullets.push(new Bullet(cx, cy, 0));
                } else if (this.weaponLevel === 2) {
                    bullets.push(new Bullet(cx - 10, cy, 0));
                    bullets.push(new Bullet(cx + 10, cy, 0));
                } else if (this.weaponLevel === 3) {
                    bullets.push(new Bullet(cx, cy - 5, 0));
                    bullets.push(new Bullet(cx - 15, cy, -1));
                    bullets.push(new Bullet(cx + 15, cy, 1));
                } else if (this.weaponLevel === 4) {
                    bullets.push(new Bullet(cx - 10, cy - 5, -0.5));
                    bullets.push(new Bullet(cx + 10, cy - 5, 0.5));
                    bullets.push(new Bullet(cx - 20, cy, -2));
                    bullets.push(new Bullet(cx + 20, cy, 2));
                } else {
                    bullets.push(new Bullet(cx, cy - 5, 0));
                    bullets.push(new Bullet(cx - 10, cy, -1));
                    bullets.push(new Bullet(cx + 10, cy, 1));
                    bullets.push(new Bullet(cx - 20, cy + 5, -2.5));
                    bullets.push(new Bullet(cx + 20, cy + 5, 2.5));
                }
            }

            hit() {
                if (this.shieldTime > 0) return false; // Shield protects
                triggerScreenShake(20);
                createExplosion(this.x + this.width / 2, this.y + this.height / 2, 50, '#fff');
                return true; // died
            }
        }

        class Bullet {
            constructor(x, y, vx) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = -15;
                this.radius = 4;
                this.color = '#fff';
                this.damage = 10;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class EnemyBullet {
            constructor(x, y, vx, vy, color = '#f00') {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = 5;
                this.color = color;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Star {
            constructor() {
                this.reset(true);
            }
            reset(randomY = false) {
                this.x = Math.random() * canvas.width;
                this.y = randomY ? Math.random() * canvas.height : -10;
                this.size = Math.random() * 2 + 0.5;
                this.speed = this.size * 2 + (Math.random());
                this.color = `rgba(255, 255, 255, ${Math.random() * 0.8 + 0.2})`;
            }
            update() {
                this.y += this.speed + (bossActive ? 2 : 0); // Warp speed in boss fight
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size * (bossActive ? 5 : 1));
            }
        }

        class Particle {
            constructor(x, y, color, speedScale = 1) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10 * speedScale;
                this.vy = (Math.random() - 0.5) * 10 * speedScale;
                this.size = Math.random() * 4 + 2;
                this.color = color;
                this.life = 1.0;
                this.decay = Math.random() * 0.05 + 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class BaseEnemy {
            constructor(x, type) {
                this.x = x || Math.random() * (canvas.width - 40) + 20;
                this.y = -50;
                this.type = type; // 'basic', 'zigzag', 'charger', 'shooter'
                this.hp = 10;
                this.maxHp = 10;
                this.width = 30;
                this.height = 30;
                this.color = '#f00';
                this.pointValue = 100;
                this.age = 0;
                this.vx = 0;
                this.vy = 2; // Default speed

                this.initType();
            }

            initType() {
                if (this.type === 'zigzag') {
                    this.color = '#f90';
                    this.hp = 20;
                    this.pointValue = 200;
                    this.originX = this.x;
                } else if (this.type === 'charger') {
                    this.color = '#f0f';
                    this.hp = 15;
                    this.vy = 1; // Starts slow
                    this.pointValue = 150;
                } else if (this.type === 'shooter') {
                    this.color = '#0f0';
                    this.hp = 30;
                    this.vy = 1.5;
                    this.pointValue = 300;
                    this.lastShot = 0;
                } else {
                    this.vy = 2 + Math.random();
                }
                this.maxHp = this.hp;
            }

            update() {
                this.age++;

                if (this.type === 'zigzag') {
                    this.x = this.originX + Math.sin(this.age * 0.05) * 100;
                    this.y += this.vy;
                } else if (this.type === 'charger') {
                    if (this.age < 60) {
                        this.y += this.vy; // Move down slowly
                    } else if (this.age === 60) {
                        // Lock onto player
                        const dx = (player.x + player.width / 2) - (this.x + this.width / 2);
                        const dy = (player.y + player.height / 2) - (this.y + this.height / 2);
                        const mag = Math.sqrt(dx * dx + dy * dy);
                        this.vx = (dx / mag) * 8;
                        this.vy = (dy / mag) * 8;
                    } else {
                        this.x += this.vx;
                        this.y += this.vy;
                    }
                } else if (this.type === 'shooter') {
                    this.y += this.vy;
                    if (this.age % 90 === 0 && this.y > 0 && this.y < canvas.height - 200) {
                        // Shoot at player
                        const dx = (player.x + player.width / 2) - (this.x + this.width / 2);
                        const dy = (player.y + player.height / 2) - (this.y + this.height / 2);
                        const mag = Math.sqrt(dx * dx + dy * dy);
                        enemyBullets.push(new EnemyBullet(this.x + this.width / 2, this.y + this.height, (dx / mag) * 4, (dy / mag) * 4));
                    }
                } else {
                    // basic
                    this.y += this.vy;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);

                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;

                // Draw different shapes based on type
                if (this.type === 'zigzag') {
                    ctx.rotate(frames * 0.1);
                    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                } else if (this.type === 'charger') {
                    ctx.beginPath();
                    ctx.moveTo(0, this.height / 2);
                    ctx.lineTo(-this.width / 2, -this.height / 2);
                    ctx.lineTo(this.width / 2, -this.height / 2);
                    ctx.fill();
                } else if (this.type === 'shooter') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.fillRect(-5, 0, 10, 15);
                } else {
                    // Basic triangle pointing down
                    ctx.beginPath();
                    ctx.moveTo(0, this.height / 2);
                    ctx.lineTo(-this.width / 2, -this.height / 2);
                    ctx.lineTo(this.width / 2, -this.height / 2);
                    ctx.fill();
                }

                // Flash white when hit
                if (this.hp < this.maxHp && frames % 4 < 2) {
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                }

                ctx.restore();
            }

            takeDamage(dmg) {
                this.hp -= dmg;
                if (this.hp <= 0) {
                    createExplosion(this.x + this.width / 2, this.y + this.height / 2, 15, this.color);
                    addScore(this.pointValue);
                    maybeDropItem(this.x + this.width / 2, this.y + this.height / 2);
                    return true; // died
                }
                return false;
            }
        }

        class Boss {
            constructor() {
                this.width = 150;
                this.height = 100;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = -200;
                this.maxHp = 2000;
                this.hp = this.maxHp;
                this.state = 'enter'; // enter, phase1, phase2, defeated
                this.age = 0;
                this.color = '#f00';
                this.vx = 2;

                bossHpContainer.style.display = 'block';
                updateBossHpUI();
            }

            update() {
                this.age++;

                if (this.state === 'enter') {
                    this.y += 1;
                    if (this.y >= 50) {
                        this.state = 'phase1';
                        this.age = 0;
                    }
                } else if (this.state === 'phase1') {
                    // Move side to side
                    this.x += this.vx;
                    if (this.x < 50 || this.x > canvas.width - this.width - 50) this.vx *= -1;

                    // Attack pattern 1: Spread waves
                    if (this.age % 80 === 0) {
                        for (let i = -3; i <= 3; i++) {
                            enemyBullets.push(new EnemyBullet(this.x + this.width / 2, this.y + this.height, i * 1.5, 4, '#f00'));
                        }
                    }

                    if (this.hp < this.maxHp * 0.5) {
                        this.state = 'phase2';
                        this.age = 0;
                        this.color = '#f0f';
                        triggerScreenShake(10);
                    }
                } else if (this.state === 'phase2') {
                    // Faster movement, erratic
                    this.x += this.vx * 1.5;
                    if (this.x < 20 || this.x > canvas.width - this.width - 20) this.vx *= -1;

                    // Pattern 2: Machine gun + aimed
                    if (this.age % 10 === 0) {
                        enemyBullets.push(new EnemyBullet(this.x + this.width / 2 + (Math.random() * 40 - 20), this.y + this.height, 0, 6, '#f0f'));
                    }
                    if (this.age % 60 === 0) {
                        const dx = (player.x + player.width / 2) - (this.x + this.width / 2);
                        const dy = (player.y + player.height / 2) - (this.y + this.height / 2);
                        const mag = Math.sqrt(dx * dx + dy * dy);
                        enemyBullets.push(new EnemyBullet(this.x + this.width / 2, this.y + this.height, (dx / mag) * 7, (dy / mag) * 7, '#ff0'));
                    }
                }
            }

            draw() {
                if (this.state === 'defeated') return;

                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);

                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;

                // Draw menacing sci-fi shape
                ctx.fillStyle = '#222';
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;

                ctx.beginPath();
                ctx.moveTo(0, -this.height / 2);
                ctx.lineTo(-this.width / 2, -this.height / 4);
                ctx.lineTo(-this.width / 2 + 20, this.height / 2);
                ctx.lineTo(0, this.height / 4);
                ctx.lineTo(this.width / 2 - 20, this.height / 2);
                ctx.lineTo(this.width / 2, -this.height / 4);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Core
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(0, 0, 20 + Math.sin(frames * 0.2) * 5, 0, Math.PI * 2);
                ctx.fill();

                // Damage flash
                if (frames % 10 < 2) {
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.fill();
                }

                ctx.restore();
            }

            takeDamage(dmg) {
                if (this.state === 'enter' || this.state === 'defeated') return false;

                this.hp -= dmg;
                updateBossHpUI();

                if (this.hp <= 0) {
                    this.state = 'defeated';
                    bossHpContainer.style.display = 'none';
                    triggerScreenShake(40);
                    setTimeout(() => {
                        bossActive = false;
                        boss = null;
                        addScore(5000);
                        scoreToNextBoss += 10000; // Next boss takes longer
                        items.push(new Item(this.x + this.width / 2, this.y + this.height / 2, 'weapon'));
                        items.push(new Item(this.x + this.width / 2 - 30, this.y + this.height / 2, 'bomb'));
                    }, 100);

                    // Massive explosion
                    for (let i = 0; i < 5; i++) {
                        setTimeout(() => {
                            createExplosion(this.x + Math.random() * this.width, this.y + Math.random() * this.height, 40, '#f00');
                        }, i * 150);
                    }
                    return true;
                }
                return false;
            }
        }

        class Item {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.vy = 2;
                this.radius = 12;
                // random type if not specified
                if (!type) {
                    const r = Math.random();
                    if (r < 0.5) this.type = 'weapon';
                    else if (r < 0.8) this.type = 'shield';
                    else this.type = 'bomb';
                } else {
                    this.type = type;
                }

                this.color = this.type === 'weapon' ? '#ffea00' : (this.type === 'shield' ? '#00ff00' : '#ff00ff');
            }
            update() {
                this.y += this.vy;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.font = '14px Orbitron';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let txt = this.type === 'weapon' ? 'W' : (this.type === 'shield' ? 'S' : 'B');
                ctx.fillText(txt, 0, 1);

                ctx.restore();
            }
            collect() {
                if (this.type === 'weapon') {
                    if (player.weaponLevel < player.maxWeaponLevel) player.weaponLevel++;
                    else addScore(500);
                    updateUI();
                } else if (this.type === 'shield') {
                    player.shieldTime = 60 * 5; // 5 seconds target 60fps
                } else if (this.type === 'bomb') {
                    player.bombs++;
                    updateUI();
                }
            }
        }

        let player;

        function init() {
            for (let i = 0; i < 100; i++) stars.push(new Star());
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            bossHpContainer.style.display = 'none';

            player = new Player();
            bullets = [];
            enemyBullets = [];
            enemies = [];
            particles = [];
            items = [];
            boss = null;
            bossActive = false;

            score = 0;
            frames = 0;
            screenShake = 0;
            scoreToNextBoss = 5000;

            state = 'playing';
            updateUI();

            requestAnimationFrame(loop);
        }

        function spawnEnemies() {
            if (bossActive) return;

            // Check if boss should spawn
            if (score >= scoreToNextBoss) {
                bossActive = true;
                boss = new Boss();
                enemies = []; // Clear normal enemies
                return;
            }

            // Difficulty scaling
            let spawnRate = Math.max(30, 90 - Math.floor(score / 200));

            if (frames % spawnRate === 0) {
                let r = Math.random();
                let type = 'basic';
                if (score > 1000 && r < 0.2) type = 'zigzag';
                else if (score > 2000 && r < 0.4) type = 'charger';
                else if (score > 3000 && r < 0.6) type = 'shooter';

                enemies.push(new BaseEnemy(null, type));
            }
        }

        function maybeDropItem(x, y) {
            if (Math.random() < 0.08) { // 8% chance to drop item unconditionally
                items.push(new Item(x, y));
            }
        }

        function useBomb() {
            if (player.bombs > 0 && state === 'playing') {
                player.bombs--;
                updateUI();
                triggerScreenShake(30);

                // Visual nuke
                let nukeEl = document.createElement('div');
                nukeEl.style.position = 'absolute';
                nukeEl.style.top = '0'; nukeEl.style.left = '0';
                nukeEl.style.width = '100%'; nukeEl.style.height = '100%';
                nukeEl.style.background = 'rgba(255,255,255,0.8)';
                nukeEl.style.pointerEvents = 'none';
                nukeEl.style.transition = 'opacity 0.5s';
                nukeEl.style.zIndex = '15';
                document.querySelector('.game-wrapper').appendChild(nukeEl);
                setTimeout(() => nukeEl.style.opacity = '0', 50);
                setTimeout(() => nukeEl.remove(), 550);

                // Destroy all bullets
                enemyBullets = [];

                // Damage all enemies and boss
                for (let i = enemies.length - 1; i >= 0; i--) {
                    enemies[i].takeDamage(50);
                }
                if (boss) boss.takeDamage(200);
            }
        }

        function createExplosion(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function triggerScreenShake(intensity) {
            screenShake = intensity;
        }

        function updateBossHpUI() {
            if (boss) {
                const pct = Math.max(0, (boss.hp / boss.maxHp) * 100);
                bossHpBar.style.width = pct + '%';
            }
        }

        function addScore(val) {
            score += val;
            uiScore.innerText = `SCORE: ${score}`;
        }

        function updateUI() {
            uiScore.innerText = `SCORE: ${score}`;
            uiWeapon.innerText = `WEAPON LV: ${player.weaponLevel}${player.weaponLevel === player.maxWeaponLevel ? ' (MAX)' : ''}`;
            uiBomb.innerText = `BOMBS (B): ${player.bombs}`;
        }

        function gameOver() {
            state = 'gameover';
            finalScoreEl.innerText = score;
            gameOverScreen.style.display = 'flex';
            createExplosion(player.x + player.width / 2, player.y + player.height / 2, 100, '#0df');
        }

        function checkCollisions() {
            // Player Bullets hitting Enemies
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                let hit = false;

                // Check Boss
                if (boss && boss.state !== 'defeated' && boss.state !== 'enter') {
                    if (b.x > boss.x && b.x < boss.x + boss.width &&
                        b.y > boss.y && b.y < boss.y + boss.height) {
                        boss.takeDamage(b.damage);
                        createExplosion(b.x, b.y, 3, '#ffa');
                        hit = true;
                    }
                }

                // Check Normal Enemies
                if (!hit) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let e = enemies[j];
                        if (b.x > e.x && b.x < e.x + e.width &&
                            b.y > e.y && b.y < e.y + e.height) {
                            e.takeDamage(b.damage);
                            createExplosion(b.x, b.y, 3, '#ffa');
                            hit = true;
                            break;
                        }
                    }
                }

                if (hit) bullets.splice(i, 1);
            }

            // Enemy Bullets hitting Player
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let b = enemyBullets[i];
                if (b.x > player.x && b.x < player.x + player.width &&
                    b.y > player.y && b.y < player.y + player.height) {
                    enemyBullets.splice(i, 1);
                    if (player.hit()) gameOver();
                }
            }

            // Enemies hitting Player
            for (let j = enemies.length - 1; j >= 0; j--) {
                let e = enemies[j];
                if (player.x < e.x + e.width && player.x + player.width > e.x &&
                    player.y < e.y + e.height && player.y + player.height > e.y) {
                    e.takeDamage(100); // destroy enemy
                    if (player.hit()) gameOver();
                }
            }

            // Boss hitting Player
            if (boss && boss.state !== 'defeated' && boss.state !== 'enter') {
                if (player.x < boss.x + boss.width && player.x + player.width > boss.x &&
                    player.y < boss.y + boss.height && player.y + player.height > boss.y) {
                    if (player.hit()) gameOver();
                }
            }

            // Player collecting Items
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                // generous collection radius
                let dx = (player.x + player.width / 2) - item.x;
                let dy = (player.y + player.height / 2) - item.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < item.radius + 30) {
                    item.collect();
                    items.splice(i, 1);
                }
            }
        }

        function loop() {
            if (state !== 'playing') {
                // we still render once and wait
                if (state === 'gameover') {
                    updateParticles();
                    render();
                }
                return;
            }

            frames++;

            // Update logic
            player.update();
            stars.forEach(s => s.update());

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update();
                if (bullets[i].y < -50 || bullets[i].y > canvas.height + 50 || bullets[i].x < -50 || bullets[i].x > canvas.width + 50) bullets.splice(i, 1);
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                enemyBullets[i].update();
                if (enemyBullets[i].y > canvas.height + 50 || enemyBullets[i].x < -50 || enemyBullets[i].x > canvas.width + 50) enemyBullets.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                if (enemies[i].y > canvas.height + 50) enemies.splice(i, 1);
            }

            for (let i = items.length - 1; i >= 0; i--) {
                items[i].update();
                if (items[i].y > canvas.height + 50) items.splice(i, 1);
            }

            if (boss) boss.update();

            updateParticles();
            spawnEnemies();
            checkCollisions();

            // Screen shake decay
            if (screenShake > 0) screenShake *= 0.9;
            if (screenShake < 0.5) screenShake = 0;

            render();

            requestAnimationFrame(loop);
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        function render() {
            // Apply screen shake
            ctx.save();
            if (screenShake > 0) {
                const dx = (Math.random() - 0.5) * screenShake;
                const dy = (Math.random() - 0.5) * screenShake;
                ctx.translate(dx, dy);
            }

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background
            stars.forEach(s => s.draw());

            // Draw objects
            if (boss) boss.draw();
            items.forEach(i => i.draw());
            enemies.forEach(e => e.draw());
            enemyBullets.forEach(b => b.draw());
            bullets.forEach(b => b.draw());

            if (state === 'playing') player.draw();

            particles.forEach(p => p.draw());

            ctx.restore();
        }

        init(); // Init stars
        render(); // Initial render to show background
    </script>
